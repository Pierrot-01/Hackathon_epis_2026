<h1 class="font-headline-md text-headline-md text-primary text-center">

<p class="font-body-sm text-body-sm text-on-surface-variant mt-2 text-center">
                Portal de Detección Temprana
            </p>
</div>
<!-- Login Form -->
<form class="space-y-6" id="loginForm">
<div class="space-y-1">
<label class="block font-label-md text-label-md text-on-surface" for="email">
                    Correo electrónico
                </label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="mail">mail</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary transition-shadow placeholder:text-outline/70" id="email" name="email" placeholder="docente@escuela.edu.pe" required="" type="email">
</div>
</div>
<div class="space-y-1">
<label class="block font-label-md text-label-md text-on-surface" for="password">
                    Contraseña
                </label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="lock">lock</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary transition-shadow placeholder:text-outline/70" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
<div class="flex justify-end pt-2">
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed-dim transition-colors" href="#">
                        ¿Olvidaste tu contraseña?
                    </a>
</div>
</div>
<div class="pt-2">
<a href="#SCREEN_51" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-full shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors">
                    Iniciar Sesión
                </a>
</div>
</form>
<!-- Contextual Help / Info -->
<div class="mt-8 pt-6 border-t border-outline-variant text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="info">info</span>

            </p>

<script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Show a subtle loading state on the button
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[20px]" data-icon="progress_activity">progress_activity</span>';
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btn.disabled = true;

            // Simulate network request then redirect
            setTimeout(() => {
                window.location.href = '#SCREEN_6';
                
                // Reset button if user navigates back (optional, but good practice)
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('opacity-80', 'cursor-not-allowed');
                    btn.disabled = false;
                }, 100);
            }, 800);
        });
    </script>
